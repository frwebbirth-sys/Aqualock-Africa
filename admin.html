<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add New Job - Aqualock Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root { --blue: #1565C0; --blue-deep: #0D47A1; --gold: #C9A84C; --dark: #0F1A2A; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; padding: 2rem; }
    .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
    .header { background: var(--blue-deep); padding: 2rem; color: white; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header p { opacity: 0.8; font-size: 0.95rem; }
    .form { padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; color: var(--dark); margin-bottom: 0.5rem; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 0.875rem 1rem; border: 2px solid #e0e6ed; border-radius: 8px; font-family: inherit; font-size: 0.95rem; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: var(--blue); }
    .photo-inputs { display: flex; flex-direction: column; gap: 0.75rem; }
    .photo-row { display: flex; gap: 0.5rem; align-items: center; }
    .photo-row input { flex: 1; }
    .btn-remove { background: #fee; color: #c33; border: none; padding: 0.5rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-add { background: var(--gold); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; margin-top: 0.5rem; }
    .btn-submit { width: 100%; background: var(--blue); color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .btn-submit:hover { background: var(--blue-deep); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .status { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
    .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .status.loading { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; display: flex; align-items: center; gap: 0.5rem; }
    .spinner { width: 16px; height: 16px; border: 2px solid #0d47a1; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .config-section { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #e0e6ed; }
    .config-section h3 { font-size: 0.9rem; color: var(--dark); margin-bottom: 1rem; }
    .config-section input { background: white; }
    .hint { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Add New Job</h1>
      <p>Add a project to the portfolio. It will be committed directly to your GitHub repository.</p>
    </div>
    
    <div class="form">
      <!-- GitHub Configuration (normally you'd hide this or pre-fill it) -->
      <div class="config-section">
        <h3>GitHub Configuration</h3>
        <div class="form-group">
          <label>Personal Access Token</label>
          <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
          <p class="hint">Your GitHub token with repo access. Keep this secret!</p>
        </div>
        <div class="form-group">
          <label>Repository (format: owner/repo)</label>
          <input type="text" id="repoName" placeholder="username/aqualock-africa" value="username/aqualock-africa">
        </div>
      </div>

      <div class="form-group">
        <label>Job Title *</label>
        <input type="text" id="jobTitle" placeholder="e.g., Constantia Estate Lawn Installation" required>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea id="jobDesc" rows="4" placeholder="Describe the project, challenges, and results..." required></textarea>
      </div>

      <div class="form-group">
        <label>Photo URLs *</label>
        <div class="photo-inputs" id="photoInputs">
          <div class="photo-row">
            <input type="url" class="photo-url" placeholder="https://example.com/photo1.jpg" required>
          </div>
        </div>
        <button type="button" class="btn-add" onclick="addPhotoField()">+ Add Photo</button>
        <p class="hint">Add up to 4 photo URLs. First photo will be featured.</p>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn" onclick="saveJob()">Save Job to Website</button>
      
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    // Add photo input field
    function addPhotoField() {
      const container = document.getElementById('photoInputs');
      if (container.children.length >= 4) {
        alert('Maximum 4 photos allowed');
        return;
      }
      const row = document.createElement('div');
      row.className = 'photo-row';
      row.innerHTML = `
        <input type="url" class="photo-url" placeholder="https://example.com/photo${container.children.length + 1}.jpg">
        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">Remove</button>
      `;
      container.appendChild(row);
    }

    // Show status message
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.className = 'status ' + type;
      status.innerHTML = type === 'loading' ? `<div class="spinner"></div>${message}` : message;
      status.style.display = 'block';
    }

    // Main save function
    async function saveJob() {
      const token = document.getElementById('githubToken').value.trim();
      const repo = document.getElementById('repoName').value.trim();
      const title = document.getElementById('jobTitle').value.trim();
      const description = document.getElementById('jobDesc').value.trim();
      
      // Collect photos
      const photos = Array.from(document.querySelectorAll('.photo-url'))
        .map(input => input.value.trim())
        .filter(url => url);

      // Validation
      if (!token || !repo || !title || !description || photos.length === 0) {
        showStatus('Please fill in all required fields', 'error');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      showStatus('Fetching current data from GitHub...', 'loading');

      try {
        // 1. Get current jobs.json file
        const filePath = 'data/jobs.json';
        const apiUrl = `https://api.github.com/repos/${repo}/contents/${filePath}`;
        
        let currentContent = [];
        let sha = null;
        
        try {
          const response = await fetch(apiUrl, {
            headers: {
              'Authorization': `token ${token}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          });
          
          if (response.ok) {
            const data = await response.json();
            sha = data.sha;
            const decoded = atob(data.content);
            currentContent = JSON.parse(decoded);
          }
        } catch (e) {
          // File doesn't exist yet, will create new
          console.log('Creating new file');
        }

        // 2. Add new job
        const newJob = {
          id: 'job_' + Date.now(),
          title: title,
          description: description,
          photos: photos,
          createdAt: new Date().toISOString()
        };
        
        currentContent.push(newJob);

        // 3. Commit to GitHub
        showStatus('Committing changes to GitHub...', 'loading');
        
        const commitMessage = `Add new job: ${title}`;
        const content = btoa(JSON.stringify(currentContent, null, 2));
        
        const commitResponse = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: commitMessage,
            content: content,
            sha: sha // null if creating new file
          })
        });

        if (commitResponse.ok) {
          showStatus('✅ Success! Job added. It will appear on the website in 1-2 minutes.', 'success');
          document.getElementById('jobTitle').value = '';
          document.getElementById('jobDesc').value = '';
          document.getElementById('photoInputs').innerHTML = `
            <div class="photo-row">
              <input type="url" class="photo-url" placeholder="https://example.com/photo1.jpg" required>
            </div>
          `;
        } else {
          const error = await commitResponse.json();
          throw new Error(error.message || 'Failed to commit');
        }

      } catch (error) {
        showStatus('❌ Error: ' + error.message, 'error');
        console.error(error);
      } finally {
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
