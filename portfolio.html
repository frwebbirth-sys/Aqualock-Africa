/* ══════════════════════════════════════════════
   HONEYCOMB BUILDER (your original function - unchanged)
══════════════════════════════════════════════ */
function buildHoneycomb() {
  const container = document.getElementById('honeycombContainer');
  container.innerHTML = '';

  const vw = window.innerWidth;
  const maxW = Math.min(vw - 32, 860);
  let W = Math.floor(maxW / 3);
  W = Math.max(W, 80);

  const H      = W * (2 / Math.sqrt(3));
  const stepY  = H * 0.75;
  const pattern = [3, 2];

  let totalRows = 0, counted = 0;
  while (counted < jobs.length) { counted += pattern[totalRows % 2]; totalRows++; }

  const cW = 3 * W;
  const cH = totalRows * stepY + H * 0.25;
  container.style.width  = cW + 'px';
  container.style.height = Math.ceil(cH) + 'px';

  let ji = 0;
  for (let row = 0; row < totalRows && ji < jobs.length; row++) {
    const cols     = pattern[row % 2];
    const isOffset = row % 2 === 1;
    const x0 = isOffset ? W : W / 2;
    const cy = H / 2 + row * stepY;

    for (let col = 0; col < cols && ji < jobs.length; col++) {
      const job  = jobs[ji];
      const cx   = x0 + col * W;
      const left = cx - W / 2;
      const top  = cy - H / 2;
      const delay = (row * 0.09 + col * 0.055).toFixed(2);

      const circleDiam = W;
      const circleLeft = 0;
      const circleTop  = (H - circleDiam) / 2;

      const ringSize = circleDiam + 6;
      const ringLeft = circleLeft - 3;
      const ringTop  = circleTop  - 3;

      const circleHTML = job.photos.slice(0, 4).map((src, i) =>
        `<img class="hex-circle-photo" src="${src}" alt="" loading="lazy"
              style="grid-area:${i < 2 ? 1 : 2}/${i % 2 + 1}/${i < 2 ? 2 : 3}/${i % 2 + 2}"/>`
      ).join('');

      const cell = document.createElement('div');
      cell.className = 'hex-cell';
      cell.dataset.id = job.id;
      cell.style.cssText = `width:${W}px;height:${H}px;left:${left}px;top:${top}px;transition-delay:${delay}s`;
      cell.innerHTML = `
        <div class="hex-shape">
          <div class="hex-outline"></div>
          <div class="hex-inner">
            <div class="hex-bg"></div>
            <div class="hex-circle" style="width:${circleDiam}px;height:${circleDiam}px;top:${circleTop}px;left:${circleLeft}px;">
              ${circleHTML}
            </div>
            <div class="hex-circle-ring" style="width:${ringSize}px;height:${ringSize}px;top:${ringTop}px;left:${ringLeft}px;"></div>
          </div>
        </div>`;
      cell.addEventListener('click', () => openPanel(job.id));
      container.appendChild(cell);
      ji++;
    }
  }

  const cells = container.querySelectorAll('.hex-cell');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.04 });
  cells.forEach(c => obs.observe(c));
}

buildHoneycomb();
let rTimer;
window.addEventListener('resize', () => { 
  clearTimeout(rTimer); 
  rTimer = setTimeout(buildHoneycomb, 250); 
});

/* PANEL & VIEWER FUNCTIONS (unchanged from your code) */
function openPanel(id) {
  const job = jobs.find(j => j.id === id);
  if (!job) return;

  document.getElementById('panelTitle').textContent = job.title;
  document.getElementById('panelDesc').textContent  = job.description;

  const grid = document.getElementById('panelPhotoGrid');
  grid.innerHTML = job.photos.map((src, i) =>
    `<div class="grid-photo${i === 0 ? ' first' : ''}" onclick="openViewer('${src}')">
       <img src="${src}" alt="${job.title} photo ${i + 1}" loading="lazy"/>
     </div>`
  ).join('');

  document.getElementById('jobPanelBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('jobPanelBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function closePanelBackdrop(e) {
  if (e.target === document.getElementById('jobPanelBackdrop')) closePanel();
}

function openViewer(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('photoViewer').classList.add('open');
}
function closeViewer() {
  document.getElementById('photoViewer').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); closeViewer(); }
});

/* SCROLL REVEAL & MOBILE MENU (unchanged) */
const revObs = new IntersectionObserver(e => e.forEach(x => { if (x.isIntersecting) x.target.classList.add('in'); }), { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));

const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

  hamburger.classList.toggle('open');

});
mobileMenu.querySelectorAll('a[href]').forEach(a => a.addEventListener('click', () => { 
  hamburger.classList.remove('open'); 
  mobileMenu.classList.remove('open'); 
}));
